apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-lab-app
  labels: { app: sre-lab-app }
spec:
  replicas: 3                       # Reason: 2 replicas = the app survives one pod dying (availability).
  selector:
    matchLabels: { app: sre-lab-app }
  template:
    metadata:
      labels: { app: sre-lab-app }
      annotations:
        prometheus.io/scrape: "true"   # Reason: a hint we'll use for Prometheus discovery.
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: app
          image: sre-lab-app:0.1.0
          imagePullPolicy: IfNotPresent  # Reason: use the locally-loaded image; don't always re-pull.
          ports: [{ containerPort: 8080 }]
          # Reason: resource requests/limits prevent one pod starving the node (saturation control).
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "250m", memory: "128Mi" }
          # Reason: probes are how Kubernetes knows if a pod is alive and ready for traffic.
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sre-lab-app
  labels: { app: sre-lab-app }
spec:
  # Reason: ClusterIP exposes the pods internally; Prometheus and the Ingress reach it here.
  selector: { app: sre-lab-app }
  ports: [{ name: http, port: 80, targetPort: 8080 }]